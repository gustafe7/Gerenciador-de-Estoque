<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Empresa — Gerenciador de Estoque</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; padding: 2.5rem 2rem; }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
        .logo-icon { width: 40px; height: 40px; background: #6c63ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 22px; height: 22px; fill: #fff; }
        .logo-text { font-size: 16px; font-weight: 600; color: #1a1a2e; }
        .logo-sub { font-size: 12px; color: #888; }
        h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 0.25rem; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 1.75rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1.5px solid #e0e0e0; border-radius: 10px; outline: none; transition: border-color 0.2s; color: #1a1a2e; background: #fafafa; }
        input:focus { border-color: #6c63ff; background: #fff; }
        .btn { width: 100%; padding: 12px; background: #6c63ff; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
        .btn:hover { background: #5848c2; }
        .erro { background: #fff0f0; color: #c0392b; border: 1px solid #ffc5c5; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; }
        .back-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #888; }
        .back-link a { color: #6c63ff; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm-9 8H5v-2h6v2zm8 0h-6v-2h6v2zm0-4H5V9h14v2z"/></svg>
            </div>
            <div>
                <div class="logo-text">Gerenciador de Estoque</div>
                <div class="logo-sub">Nova empresa</div>
            </div>
        </div>

        <h1>Criar empresa</h1>
        <p class="subtitle">Você será o administrador desta empresa</p>

        {% if error %}
            <div class="erro">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'criar_empresa' %}">
            {% csrf_token %}
            <div class="field">
                <label for="nome">Nome da empresa</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Loja do João" required autofocus>
            </div>
            <button type="submit" class="btn">Criar empresa</button>
        </form>

        <div class="back-link">
            <a href="{% url 'selecionar_empresa' %}">← Voltar</a>
        </div>
    </div>
</body>
</html>
